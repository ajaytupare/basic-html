<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Tags</title>
</head>
<body>
    <h3>Image tag</h3>
        <img src="nature.jpg" alt="the nature" width="300">
    <h3>Video tag</h3>
        <video src="animatedvideo.mp4" width="300" controls type="video/mp4">
        <!-- <source src="video.mp4" type="video/mp4"> -->
        </video>
    <h3>Audio Tag</h3>
        <audio width="300" controls>
            <source src="Interstellar Official Soundtrack  Cornfield Chase  Hans Zimmer  WaterTower.mp3" type="audio/mp3">
        </audio>
    <h3>Iframe tag</h3>
        <iframe src="https://www.youtube.com/embed/3eSKo66Um9k?si=9_SUEnW3ks6CGDJf"></iframe>
            <embed src="Micro Proposal of course enrollment system JAVA-AJ-Final.pdf" type="application/pdf">
        <embed src="Interstellar Official Soundtrack  Cornfield Chase  Hans Zimmer  WaterTower.mp3" type="audio/mp3">
            <embed src="animatedvideo.mp4" type="video/mp4">
</body>
</html>
